name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm run install:all

    - name: Build frontend
      run: npm run build

    - name: Start backend and test
      run: |
        cd backend
        timeout 30s node server.js &
        sleep 5
        curl -f http://localhost:3000/api/health || exit 1
        curl -f "http://localhost:3000/api/whois?domain=google.com" || exit 1
        curl -f "http://localhost:3000/api/rdap?domain=google.com" || exit 1
        curl -f "http://localhost:3000/api/prices?domain=google.com" || exit 1
        echo "All API tests passed!"
